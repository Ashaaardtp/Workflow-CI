name: MLflow Project CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas numpy scikit-learn

      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Save model to separate branch (skilled)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MODEL_FILE=$(find MLProject/mlruns -name "model.pkl" | head -n 1)
          if [ -f "$MODEL_FILE" ]; then
            git checkout --orphan models
            mkdir -p saved_models
            cp "$MODEL_FILE" saved_models/model_$(date +'%Y%m%d_%H%M%S').pkl
            git add saved_models/
            git commit -m "Add retrained model [skip ci]"
            git push origin models --force
          else
            echo "Model file not found"
          fi
        continue-on-error: true

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
