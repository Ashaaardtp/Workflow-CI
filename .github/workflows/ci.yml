name: MLflow Retraining CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "MLProject/**"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Save model to separate branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MODEL_FILE=$(find MLProject/mlruns -name "model.pkl" | head -n 1)
          if [ -f "$MODEL_FILE" ]; then
            git checkout --orphan models
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p saved_models
            cp "$MODEL_FILE" saved_models/model_$(date +'%Y%m%d_%H%M%S').pkl
            git add saved_models/
            git commit -m "Add retrained model [skip ci]"
            git push origin models --force
          else
            echo "Model file not found"
          fi
        continue-on-error: true

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name:
          Build and push Docker image using MLflow
        run: |
          MODEL_PATH=$(find MLProject/mlruns -name "model" -type d | head -n 1)
          if [ -d "$MODEL_PATH" ]; then
            mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKER_USERNAME }}/california-housing:latest"
            docker push "${{ secrets.DOCKER_USERNAME }}/california-housing:latest"
          else
            echo "Model directory not found, skipping docker build"
          fi

      - name: Save Docker Hub link
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/california-housing" > MLProject/Tautan_ke_Docker_Hub.txt

      - name: Upload Docker link as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-link
          path: MLProject/Tautan_ke_Docker_Hub.txt
