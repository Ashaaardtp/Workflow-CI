name: MLflow Project CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas numpy scikit-learn

      - name: Debug MLflow setup
        run: |
          python -c "import mlflow; print(f'MLflow version: {mlflow.__version__}')"
          ls -la MLProject/

      - name: Run MLflow Project
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          mlflow run . --env-manager=local -e main
          cd ..

      - name: Save model to separate branch (skilled)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MODEL_FILE=$(find MLProject/mlruns -name "model" -type d | head -n 1)
          if [ -d "$MODEL_FILE" ]; then
            git checkout --orphan models 2>/dev/null || git checkout models
            mkdir -p saved_models
            cp -r "$MODEL_FILE" saved_models/model_$(date +'%Y%m%d_%H%M%S')
            git add saved_models/
            git commit -m "Add retrained model [skip ci]" || echo "Nothing to commit"
            git push origin models --force
          else
            echo "Model directory not found in $MODEL_FILE"
            find MLProject/mlruns -type f | head -20
          fi
        continue-on-error: true

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
        continue-on-error: true
