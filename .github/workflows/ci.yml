name: CI with Docker Build (Advance)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs track "*.pkl"
          git add .gitattributes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mlflow pandas numpy scikit-learn

      - name: Run training
        working-directory: ./MLProject
        run: python modelling.py


      - name: Save model to separate branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MODEL_FILE=$(find MLProject/mlruns -name "model.pkl" | head -n 1)
          if [ -f "$MODEL_FILE" ]; then
            git checkout --orphan models
            mkdir -p saved_models
            cp "$MODEL_FILE" saved_models/model_$(date +'%Y%m%d_%H%M%S').pkl
            git add saved_models/
            git commit -m "Add retrained model [skip ci]"
            git push origin models --force
          else
            echo "Model file not found"
          fi
        continue-on-error: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: registry-1.docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Find model path and build with mlflow
        run: |
          MODEL_PATH=$(find MLProject/mlruns -name "model" -type d | head -n 1)
          if [ -d "$MODEL_PATH" ]; then
            echo "Building Docker image using mlflow models build-docker"
            mlflow models build-docker -m "$MODEL_PATH" -n ${{ secrets.DOCKER_USERNAME }}/california-housing --enable-mlserver
          else
            echo "Model not found, using docker build fallback"
            docker build -t ${{ secrets.DOCKER_USERNAME }}/california-housing:latest ./MLProject
          fi

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/california-housing:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/california-housing:latest ${{ secrets.DOCKER_USERNAME }}/california-housing:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/california-housing:${{ github.run_id }}

      - name: Save Docker Hub link
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/california-housing" > MLProject/tautan_docker_hub.txt

      - name: Commit Docker link
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/tautan_docker_hub.txt
          git diff --cached --quiet || git commit -m "Update Docker Hub link [skip ci]"
          git push origin main
